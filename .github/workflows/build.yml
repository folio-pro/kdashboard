name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Install Tauri CLI
        run: bun run tauri -- --version || bunx @tauri-apps/cli --version

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

          # ── Apple Code Signing ─────────────────────────────────────────────────────
          # Current: ad-hoc signing (no Apple Developer Program enrollment needed).
          # Users must right-click → Open to bypass Gatekeeper warnings.
          #
          # To enable full Apple Developer signing + notarization:
          # 1. Enroll in Apple Developer Program ($99/year)
          # 2. Create a Developer ID Application certificate
          # 3. Export as .p12, base64-encode, add as GitHub secret APPLE_CERTIFICATE
          # 4. Add secrets: APPLE_SIGNING_IDENTITY, APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
          #                 APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
          # See TODOS.md "Apple Developer Code Signing + Notarization" for full setup steps.
          #
          # Full signing (uncomment when certificates are provisioned):
          # APPLE_SIGNING_IDENTITY: "${{ secrets.APPLE_SIGNING_IDENTITY }}"
          # APPLE_CERTIFICATE: "${{ secrets.APPLE_CERTIFICATE }}"
          # APPLE_CERTIFICATE_PASSWORD: "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}"
          # APPLE_ID: "${{ secrets.APPLE_ID }}"
          # APPLE_PASSWORD: "${{ secrets.APPLE_PASSWORD }}"
          # APPLE_TEAM_ID: "${{ secrets.APPLE_TEAM_ID }}"
          #
          # For notarization with full signing, also add: `notarize: true` in `with:` block
          # ─────────────────────────────────────────────────────────────────────────────
          APPLE_SIGNING_IDENTITY: "-"
        with:
          tauriScript: bunx tauri
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kdashboard-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi.sig
          if-no-files-found: ignore

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Stage release assets and build latest.json
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          OUT="release-assets"
          mkdir -p "$OUT"

          echo "::group::Stage installers"
          # Installers go to the release as-is (no rename needed)
          find artifacts -type f \( \
            -name "*.dmg" -o \
            -name "*.AppImage" -o \
            -name "*.deb" -o \
            -name "*.rpm" -o \
            -name "*.msi" -o \
            -name "*.exe" \
          \) -exec cp {} "$OUT/" \;
          echo "::endgroup::"

          echo "::group::Stage updater bundles with arch-qualified names"
          # macOS aarch64
          find artifacts/kdashboard-aarch64-apple-darwin -name "*.app.tar.gz" \
            -exec cp {} "$OUT/kdashboard_aarch64.app.tar.gz" \;
          find artifacts/kdashboard-aarch64-apple-darwin -name "*.app.tar.gz.sig" \
            -exec cp {} "$OUT/kdashboard_aarch64.app.tar.gz.sig" \;

          # macOS x86_64
          find artifacts/kdashboard-x86_64-apple-darwin -name "*.app.tar.gz" \
            -exec cp {} "$OUT/kdashboard_x86_64.app.tar.gz" \;
          find artifacts/kdashboard-x86_64-apple-darwin -name "*.app.tar.gz.sig" \
            -exec cp {} "$OUT/kdashboard_x86_64.app.tar.gz.sig" \;

          # Linux x86_64 — AppImage already staged above; add its .sig
          find artifacts/kdashboard-x86_64-unknown-linux-gnu -name "*.AppImage.sig" \
            -exec cp {} "$OUT/" \;

          # Windows x86_64 — NSIS .exe already staged; add its .sig (NSIS preferred over MSI for updater)
          find artifacts/kdashboard-x86_64-pc-windows-msvc -path "*/nsis/*.exe.sig" \
            -exec cp {} "$OUT/" \;

          ls -lh "$OUT/"
          echo "::endgroup::"

          echo "::group::Resolve per-platform asset names"
          # Find the exact installer filenames produced by Tauri (they embed version).
          LINUX_APPIMAGE="$(find "$OUT" -maxdepth 1 -name "*.AppImage" -printf '%f\n' | head -n1)"
          LINUX_SIG="$(find "$OUT" -maxdepth 1 -name "*.AppImage.sig" -printf '%f\n' | head -n1)"
          WIN_EXE="$(find "$OUT" -maxdepth 1 -name "*-setup.exe" -printf '%f\n' | head -n1 \
            || find "$OUT" -maxdepth 1 -name "*.exe" -printf '%f\n' | head -n1)"
          WIN_SIG="$(find "$OUT" -maxdepth 1 -name "${WIN_EXE}.sig" -printf '%f\n' | head -n1)"

          echo "LINUX_APPIMAGE=$LINUX_APPIMAGE" | tee -a "$GITHUB_ENV"
          echo "LINUX_SIG=$LINUX_SIG"           | tee -a "$GITHUB_ENV"
          echo "WIN_EXE=$WIN_EXE"               | tee -a "$GITHUB_ENV"
          echo "WIN_SIG=$WIN_SIG"               | tee -a "$GITHUB_ENV"
          echo "::endgroup::"

          echo "::group::Build latest.json"
          BASE_URL="https://github.com/${REPO}/releases/download/v${VERSION}"

          read_sig() {
            local f="$OUT/$1"
            if [ -f "$f" ]; then cat "$f"; else echo ""; fi
          }

          cat > "$OUT/latest.json" <<MANIFEST
          {
            "version": "${VERSION}",
            "notes": "kdashboard v${VERSION}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$(read_sig kdashboard_aarch64.app.tar.gz.sig)",
                "url": "${BASE_URL}/kdashboard_aarch64.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "$(read_sig kdashboard_x86_64.app.tar.gz.sig)",
                "url": "${BASE_URL}/kdashboard_x86_64.app.tar.gz"
              },
              "linux-x86_64": {
                "signature": "$(read_sig "${LINUX_SIG}")",
                "url": "${BASE_URL}/${LINUX_APPIMAGE}"
              },
              "windows-x86_64": {
                "signature": "$(read_sig "${WIN_SIG}")",
                "url": "${BASE_URL}/${WIN_EXE}"
              }
            }
          }
          MANIFEST

          cat "$OUT/latest.json"
          echo "::endgroup::"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: release-assets/**/*
