name: Tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  js-tests:
    name: JS (Bun)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Run JS tests
        run: bun run test:js

  rust-tests:
    name: Rust
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  integration-tests:
    name: Integration (K8s)
    runs-on: ubuntu-latest
    needs: [rust-tests]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: integration

      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: kdash-integration
          wait: 60s

      - name: Seed test resources
        run: |
          kubectl apply -f src-tauri/tests/fixtures/seed.yaml
          kubectl rollout status deployment/test-nginx -n kdash-test --timeout=120s

      - name: Run integration tests
        env:
          KDASH_TEST_CONTEXT: kind-kdash-integration
          KDASH_TEST_NAMESPACE: kdash-test
        run: |
          cargo test --manifest-path src-tauri/Cargo.toml \
            --features integration \
            -- --test-threads=1 integration
