---
apiVersion: v1
kind: Namespace
metadata:
  name: kdash-test
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: test-config
  namespace: kdash-test
  labels:
    app: kdash-integration
data:
  key1: value1
  key2: value2
---
apiVersion: v1
kind: Secret
metadata:
  name: test-secret
  namespace: kdash-test
  labels:
    app: kdash-integration
type: Opaque
stringData:
  username: admin
  password: secret123
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-nginx
  namespace: kdash-test
  labels:
    app: kdash-integration
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-nginx
  template:
    metadata:
      labels:
        app: test-nginx
        tier: frontend
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: test-nginx-svc
  namespace: kdash-test
  labels:
    app: kdash-integration
spec:
  selector:
    app: test-nginx
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: batch/v1
kind: Job
metadata:
  name: test-job
  namespace: kdash-test
  labels:
    app: kdash-integration
spec:
  template:
    spec:
      containers:
        - name: busybox
          image: busybox:1.37
          command: ["sh", "-c", "echo done && sleep 1"]
          resources:
            requests:
              cpu: 10m
              memory: 8Mi
            limits:
              cpu: 50m
              memory: 32Mi
      restartPolicy: Never
  backoffLimit: 1
